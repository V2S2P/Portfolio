{{ define "main" }}

<section class="max-w-6xl mx-auto px-4">

  <h1 class="text-3xl font-bold mb-4">{{ .Title }}</h1>
  <p class="mb-8 text-neutral-500 dark:text-neutral-400">
    {{ .Description }}
  </p>

  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">

    {{ range .Pages }}
    <article class="bg-neutral-100 dark:bg-neutral-800 rounded-2xl p-6 shadow hover:shadow-lg transition">

      <h2 class="text-xl font-semibold mb-2">
        <a href="{{ .RelPermalink }}" class="hover:underline">
          {{ .Title }}
        </a>
      </h2>

      <p class="text-sm text-neutral-500 mb-2">
        {{ .Date.Format "Jan 2, 2006" }}
      </p>

      <p class="text-sm text-neutral-700 dark:text-neutral-300">
        {{ .Summary }}
      </p>

      {{ if .Params.tags }}
      <div class="mt-3 flex flex-wrap gap-2">
        {{ range .Params.tags }}
          <span class="text-xs bg-neutral-200 dark:bg-neutral-700 px-2 py-1 rounded">
            #{{ . }}
          </span>
        {{ end }}
      </div>
      {{ end }}

      <a href="{{ .RelPermalink }}" 
         class="inline-block mt-4 text-blue-500 hover:underline text-sm">
        Read more →
      </a>

    </article>
    {{ end }}

  </div>

</section>

{{ end }}
