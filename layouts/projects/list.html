{{ define "main" }}

<section class="max-w-5xl mx-auto px-4 py-8">

  <h1 class="text-4xl font-bold mb-3">{{ .Title }}</h1>
  {{ with .Description }}
  <p class="mb-10 text-lg text-neutral-500 dark:text-neutral-400">{{ . }}</p>
  {{ end }}

  <div class="grid gap-6 sm:grid-cols-2">

    {{ range .Pages }}
    <article class="group flex flex-col bg-neutral-100 dark:bg-neutral-800 rounded-2xl p-6 shadow-sm hover:shadow-md transition-all duration-200 hover:-translate-y-1">

      <span class="text-xs font-semibold uppercase tracking-widest text-primary-600 dark:text-primary-400 mb-3">
        Project
      </span>

      <h2 class="text-xl font-semibold leading-snug mb-2">
        <a href="{{ .RelPermalink }}" class="hover:text-primary-600 dark:hover:text-primary-400 transition-colors duration-150">
          {{ .Title }}
        </a>
      </h2>

      <p class="text-xs text-neutral-400 dark:text-neutral-500 mb-3">
        {{ .Date.Format "Jan 2, 2006" }}
      </p>

      <p class="text-sm text-neutral-600 dark:text-neutral-400 leading-relaxed flex-1">
        {{ .Summary }}
      </p>

      {{ if .Params.tags }}
      <div class="mt-4 flex flex-wrap gap-1.5">
        {{ range .Params.tags }}
          <span class="text-xs bg-neutral-200 dark:bg-neutral-700 text-neutral-600 dark:text-neutral-300 px-2 py-0.5 rounded-full">
            {{ . }}
          </span>
        {{ end }}
      </div>
      {{ end }}

      <a href="{{ .RelPermalink }}"
         class="inline-flex items-center gap-1 mt-5 text-sm font-medium text-primary-600 dark:text-primary-400 group-hover:gap-2 transition-all duration-150">
        View project
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </a>

    </article>
    {{ end }}

  </div>

</section>

{{ end }}
