<style>
#chat-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
  font-family: inherit;
}

#chat-panel {
  display: none;
  flex-direction: column;
  width: 360px;
  max-width: calc(100vw - 48px);
  height: 460px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  border: 1px solid rgba(0,0,0,0.08);
  background: #ffffff;
}

#chat-panel.open {
  display: flex;
}

.dark #chat-panel {
  background: #1f2937;
  border-color: rgba(255,255,255,0.08);
}

#chat-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: rgb(var(--color-primary-600));
  color: white;
  flex-shrink: 0;
}

#chat-panel-header span {
  font-weight: 600;
  font-size: 0.9rem;
}

#chat-close-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.8);
  cursor: pointer;
  padding: 2px 6px;
  font-size: 1rem;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.1s, background 0.1s;
}

#chat-close-btn:hover {
  color: white;
  background: rgba(255,255,255,0.15);
}

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.chat-bubble {
  max-width: 82%;
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 0.875rem;
  line-height: 1.5;
  word-break: break-word;
}

.chat-bubble.user {
  align-self: flex-end;
  background: rgb(var(--color-primary-600));
  color: white;
  border-bottom-right-radius: 4px;
}

.chat-bubble.bot {
  align-self: flex-start;
  background: #f3f4f6;
  color: #111827;
  border-bottom-left-radius: 4px;
}

.dark .chat-bubble.bot {
  background: #374151;
  color: #f3f4f6;
}

.chat-bubble.thinking {
  align-self: flex-start;
  background: #f3f4f6;
  color: #6b7280;
  font-style: italic;
  border-bottom-left-radius: 4px;
}

.dark .chat-bubble.thinking {
  background: #374151;
  color: #9ca3af;
}

.chat-bubble ul {
  margin: 4px 0;
  padding-left: 16px;
}

#chat-input-row {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-top: 1px solid rgba(0,0,0,0.07);
  flex-shrink: 0;
}

.dark #chat-input-row {
  border-top-color: rgba(255,255,255,0.07);
}

#chat-text-input {
  flex: 1;
  min-width: 0;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.12);
  background: #f9fafb;
  color: #111827;
  font-family: inherit;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.15s;
}

#chat-text-input:focus {
  border-color: rgb(var(--color-primary-600));
  box-shadow: 0 0 0 3px rgba(var(--color-primary-600), 0.12);
}

.dark #chat-text-input {
  background: #374151;
  border-color: rgba(255,255,255,0.12);
  color: #f9fafb;
}

.dark #chat-text-input::placeholder {
  color: #9ca3af;
}

#chat-send-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: rgb(var(--color-primary-600));
  color: white;
  border: none;
  cursor: pointer;
  font-size: 0.875rem;
  font-family: inherit;
  font-weight: 500;
  flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
}

#chat-send-btn:hover {
  opacity: 0.88;
}

#chat-send-btn:active {
  transform: scale(0.97);
}

#chat-toggle-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgb(var(--color-primary-600));
  color: white;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  flex-shrink: 0;
}

#chat-toggle-btn:hover {
  transform: scale(1.07);
  box-shadow: 0 6px 22px rgba(0,0,0,0.25);
}
</style>

<div id="chat-widget">
  <div id="chat-panel" role="dialog" aria-label="AI Assistant">
    <div id="chat-panel-header">
      <span>AI Assistant</span>
      <button id="chat-close-btn" onclick="toggleChatPanel()" aria-label="Close chat">✕</button>
    </div>
    <div id="chat-messages" aria-live="polite"></div>
    <div id="chat-input-row">
      <input id="chat-text-input" type="text" placeholder="Ask something..." autocomplete="off" />
      <button id="chat-send-btn" onclick="sendChatMessage()">Send</button>
    </div>
  </div>
  <button id="chat-toggle-btn" onclick="toggleChatPanel()" aria-label="Open AI chat">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
  </button>
</div>

<script>
(function () {
  const API_URL = location.hostname === "localhost"
    ? "http://localhost:7070/chat"
    : "https://desktop-frmtli1.taild8f6b7.ts.net/chat";

  window.toggleChatPanel = function () {
    const panel = document.getElementById("chat-panel");
    panel.classList.toggle("open");
    if (panel.classList.contains("open")) {
      document.getElementById("chat-text-input").focus();
    }
  };

  function formatMarkdown(text) {
    return text
      .replace(/^## (.*$)/gim, '<strong>$1</strong>')
      .replace(/^- (.*$)/gim, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gims, '<ul>$1</ul>')
      .replace(/\n/g, '<br>');
  }

  function addBubble(text, type) {
    const messages = document.getElementById("chat-messages");
    const div = document.createElement("div");
    div.className = "chat-bubble " + type;
    if (type === "bot") {
      div.innerHTML = formatMarkdown(text);
    } else {
      div.textContent = text;
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  window.sendChatMessage = async function () {
    const input = document.getElementById("chat-text-input");
    const message = input.value.trim();
    if (!message) return;

    addBubble(message, "user");
    input.value = "";

    const thinking = addBubble("Thinking…", "thinking");

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: message
      });
      const answer = await res.text();
      thinking.remove();
      addBubble(answer, "bot");
    } catch (err) {
      thinking.remove();
      addBubble("Backend not reachable.", "bot");
      console.error(err);
    }
  };

  document.getElementById("chat-text-input").addEventListener("keydown", function (e) {
    if (e.key === "Enter") window.sendChatMessage();
  });
})();
</script>
